<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0b0f19" />
      <stop offset="50%" stop-color="#111827" />
      <stop offset="100%" stop-color="#070a13" />
    </linearGradient>

    <!-- Neon Accents -->
    <linearGradient id="neonCyan" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#06b6d4" />
      <stop offset="100%" stop-color="#3b82f6" />
    </linearGradient>
    <linearGradient id="neonPurple" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#d946ef" />
      <stop offset="100%" stop-color="#8b5cf6" />
    </linearGradient>

    <!-- Glow Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <!-- Keyframe Animations for Dynamic Aspect -->
    <style>
      @keyframes pulse {
        0%, 100% { opacity: 0.3; transform: scale(1); }
        50% { opacity: 0.8; transform: scale(1.05); }
      }
      @keyframes dash {
        to {
          stroke-dashoffset: -40;
        }
      }
      @keyframes float {
        0%, 100% { transform: translateY(0px); }
        50% { transform: translateY(-10px); }
      }
      .node-pulse {
        animation: pulse 4s ease-in-out infinite;
        transform-origin: center;
      }
      .flow-line {
        stroke-dasharray: 8, 12;
        animation: dash 2s linear infinite;
      }
      .floating-card {
        animation: float 6s ease-in-out infinite;
      }
      .text-title {
        font-family: 'Outfit', 'Inter', -apple-system, sans-serif;
        font-weight: 800;
        fill: #ffffff;
      }
      .text-sub {
        font-family: 'Inter', -apple-system, sans-serif;
        fill: #9ca3af;
        letter-spacing: 2px;
      }
    </style>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="url(#bgGrad)" />

  <!-- Animated Grid Background (Dynamic Feel) -->
  <g opacity="0.05">
    <path d="M 0,50 L 1200,50 M 0,100 L 1200,100 M 0,150 L 1200,150 M 0,200 L 1200,200 M 0,250 L 1200,250 M 0,300 L 1200,300 M 0,350 L 1200,350" stroke="#ffffff" stroke-width="1" />
    <path d="M 100,0 L 100,400 M 200,0 L 200,400 M 300,0 L 300,400 M 400,0 L 400,400 M 500,0 L 500,400 M 600,0 L 600,400 M 700,0 L 700,400 M 800,0 L 800,400 M 900,0 L 900,400 M 1000,0 L 1000,400 M 1100,0 L 1100,400" stroke="#ffffff" stroke-width="1" />
  </g>

  <!-- Dynamic Flow Lines -->
  <g stroke-width="2" opacity="0.6">
    <path class="flow-line" d="M 150,200 Q 300,100 450,200 T 750,200" fill="none" stroke="url(#neonCyan)" />
    <path class="flow-line" d="M 150,200 Q 300,300 450,200 T 750,200" fill="none" stroke="url(#neonPurple)" />
  </g>

  <!-- Central Visual Elements (Agent & Tools representation) -->
  <!-- Center LLM Agent Node -->
  <g class="floating-card" style="animation-delay: 0s;">
    <circle cx="150" cy="200" r="45" fill="#1e1b4b" stroke="url(#neonCyan)" stroke-width="3" filter="url(#glow)" />
    <text x="150" y="205" font-family="sans-serif" font-size="14" fill="#67e8f9" text-anchor="middle" font-weight="bold">AGENT</text>
  </g>

  <!-- Tool nodes -->
  <g class="floating-card" style="animation-delay: 1s;">
    <circle cx="450" cy="100" r="30" fill="#111827" stroke="url(#neonPurple)" stroke-width="2" />
    <text x="450" y="105" font-family="sans-serif" font-size="12" fill="#f472b6" text-anchor="middle">API</text>
  </g>

  <g class="floating-card" style="animation-delay: 2s;">
    <circle cx="450" cy="300" r="30" fill="#111827" stroke="url(#neonPurple)" stroke-width="2" />
    <text x="450" y="305" font-family="sans-serif" font-size="12" fill="#f472b6" text-anchor="middle">DB</text>
  </g>

  <g class="floating-card" style="animation-delay: 1.5s;">
    <circle cx="750" cy="200" r="35" fill="#111827" stroke="url(#neonCyan)" stroke-width="2" />
    <text x="750" y="204" font-family="sans-serif" font-size="11" fill="#67e8f9" text-anchor="middle">BROWSER</text>
  </g>

  <!-- Glowing pulse background for text to pop -->
  <circle class="node-pulse" cx="950" cy="200" r="120" fill="url(#neonCyan)" opacity="0.1" filter="url(#glow)" />

  <!-- Banner Typography -->
  <g transform="translate(850, 180)">
    <text class="text-title" font-size="44" letter-spacing="-1">AWESOME</text>
    <text class="text-title" font-size="44" y="50" fill="url(#neonCyan)" filter="url(#glow)">TOOL USE</text>
    <text class="text-sub" font-size="12" y="90">HISTORY &amp; LANDSCAPE</text>
  </g>
</svg>
